# Welcome message
welcome:
  title: |
    📚 <b>Hi! I'll help you search and download books directly from the Flibusta library.</b> 

    <u>Controls</u>
    /news - bot news and updates
    /about - information about the bot and library 
    /help - help with search queries
    /genres - browse available genres
    /pop - popular books and new releases
    /set - search and display settings
    /donate - support the developer

# Help
help:
  title: |
    <b>Help with book search.</b>

    <u>Simple search by any words:</u>
    ✏️ <code>Leo Tolstoy war peace</code>
    ✏️ <code>science fiction space stars 2025</code>
    ✏️ <code>Harry Potter</code>
    ✏️ <code>Perelman mathematics physics</code>

    <u>Tips for effective searching:</u>
    🔍 <b>Multiple words</b> - the bot searches for books containing any of the listed words
    ➕ <b>Required word</b> - use + before a word: <code>+life +remarkable people</code>
    ➖ <b>Excluding words</b> - use - before a word: <code>+Rasputin -Valentin</code>
    ⭐️ <b>Word parts</b> - you can use *: <code>mathemat* problem*</code>
    🔄 <b>Word grouping</b> - use (): <code>+(elf goblin orc dwarf) +(lonely evil sad huge)</code>
    📏 <b>Word proximity</b> - use @N after a phrase in double quotes: <code>"currently lives Moscow" @5</code>
    🔎 <b>Annotation search</b> - in settings enable "Search area" → "by book annotations" or "by author annotations"

    <u>Search scope:</u>
    📖 Main search covers: <b>book title, authors, genres, series, and publication year</b>
    📚 Annotation search - searches through <b>full book descriptions or author biographies</b>. Words of 3+ letters are indexed

    <u>Examples for book annotation search:</u>
    📘 <code>+(elves dwarves orcs) +(evil lonely big sad)</code> - fantasy worlds with magic
    📘 <code>+(travel invasions aliens) +(space time other worlds)</code> - space sci-fi
    📘 <code>+author +created amazing magical +world</code> - books with rich worldbuilding
    📘 <code>+russian +commander Patriotic war</code> - historical literature
    📘 <code>+collection +fantastic +(stories novellas) +soviet -(foreign)</code> - Soviet sci-fi

    <u>Examples for author annotation search:</u>
    👤 <code>+awarded +(medals orders)</code> - authors awarded medals or orders
    👤 <code>"died 1980" @5</code> - authors who died in 1980 (words within 5 words of each other)
    👤 <code>+(born lived died) +Penza +province</code> - authors connected to Penza province
    👤 <code>+philologist +translator +journalist</code> - philologists, translators and journalists
    👤 <code>"currently lives Moscow" @5</code> - authors currently living in Moscow
    👤 <code>"fought wounded battle" @10</code> - authors wounded in combat
    
    <u>Result limits:</u>
    ⚡️ Search results are temporarily limited to <b>2000 books, 200 authors, and 200 series</b> for performance

    <u>Available display formats (in settings):</u>
    📚 <b>By books</b> - list of books
    👥 <b>By authors</b> - grouped by authors
    📖 <b>By series</b> - grouped by series

# About
about:
  title: |
    <b>Flibusta Bot</b> - a Telegram bot for searching and downloading books directly from the Flibusta library website.

    📊 <b>Bot library database statistics:</b>
    • 📚 Books: <code>{books_count}</code>
    • 👥 Authors: <code>{authors_count}</code>
    • 📖 Series: <code>{series_count}</code>
    • 🏷️ Genres: <code>{genres_count}</code>
    • 🌐 Languages: <code>{languages_count}</code>
    • 📅 Updated: <code>{last_update}</code>
    • 🔢 Max book file ID: <code>{max_filename}</code>

    ⚡ <b>Bot features:</b>
    • 🔍 Main book search by title, author, genre, series, and year
    • 📝 Search through book and author annotations
    • 📈 Browse new releases and popular books
    • 📚 Results grouped by series and authors
    • 👤 Detailed author info with photo and biography
    • 📖 Book and author annotations and reader reviews
    • 🖼️ Book covers and author photos from Flibusta
    • 📥 Download in fb2, epub, mobi formats
    • ⭐ Filter by rating, size, and language
    • ⚙️ Flexible search settings
    
    {reader_recommendations}
    📞 <b>Feedback:</b>
    • 📧 Email: <code>{email}</code>
    • 🎮 Blog: <a href="{blog}">{blog_name}</a>
    • 📢 TG channel: <a href="{tg_channel}">{tg_channel_name}</a>

    🛠 <b>Technology:</b>
    • Python 3.11 + python-telegram-bot
    • MariaDB + native Flibusta DB

